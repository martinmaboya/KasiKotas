# Server Port
server.port=8080

# Database connection (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kasikotas_db_si2n?connectTimeout=30&socketTimeout=30&tcpKeepAlive=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=KasiKotasHikariPool

# JPA and Hibernate Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Mail Configuration - Gmail SMTP (works on Render.com)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.test-connection=false

# Admin Email Address
admin.email=YOUR_GMAIL_ADDRESS@gmail.com
jwt.secret=r1QycRsGXwPCyZxDTw9vIiCIV8ADcvQRxPXe/pe7cPcJv0oHH8iOVTHA9WjldrzKDu2x1OaCMjhQYbzdtlqsQQ==

# Jackson Configuration for proper date/time handling
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Cache Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=30s

# WebAuthn / Passkey configuration
webauthn.rp-id=${WEBAUTHN_RP_ID:localhost}
webauthn.rp-name=${WEBAUTHN_RP_NAME:KasiKotas}
webauthn.allowed-origins=${WEBAUTHN_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,https://kasikotas-frondend.onrender.com}
